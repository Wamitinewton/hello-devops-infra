apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-devops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wamitinewton/hello-devops-infra.git
    targetRevision: HEAD
    path: apps/hello-devops
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true